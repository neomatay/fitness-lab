# GitHub Pages 自动部署：push 到 main 后自动构建并发布
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: 诊断（环境版本）
        run: |
          echo "node: $(node -v)"
          echo "pnpm: $(pnpm -v)"
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 诊断（关键依赖）
        run: |
          echo "tsc: $(npx tsc --version)"
          test -f node_modules/zustand/package.json && echo "zustand ✓" || echo "zustand ✗"
          test -f node_modules/@types/react/package.json && echo "@types/react ✓" || echo "@types/react ✗"
      - name: 构建
        run: pnpm run build
      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
