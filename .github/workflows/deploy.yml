# GitHub Pages 自动部署：push 到 main 后自动构建并发布
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 安装依赖
        run: npm install
      - name: 诊断（版本与关键依赖）
        run: |
          echo "node: $(node -v)"
          echo "tsc: $(npx tsc --version)"
          ls node_modules/zustand/package.json && echo "zustand ✓" || echo "zustand ✗"
          ls node_modules/@types/react/package.json && echo "@types/react ✓" || echo "@types/react ✗"
      - name: 构建
        run: npm run build
      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
